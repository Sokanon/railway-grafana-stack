apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://${PROMETHEUS_HOST}:9090
    isDefault: true
    editable: true

  - name: Loki
    type: loki
    access: proxy
    url: http://${LOKI_HOST}:3100
    editable: true
    jsonData:
      maxLines: 1000
